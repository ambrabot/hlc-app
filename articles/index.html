<style>
  :root{ --bg:#060f09; --panel:rgba(255,255,255,.045); --line:rgba(110,231,183,.16); --fg:#eaf3ec; --mut:#9bb3a4; --emerald:#6ee7b7; --gold:#d8b46a; }
  *{box-sizing:border-box;margin:0;padding:0}
