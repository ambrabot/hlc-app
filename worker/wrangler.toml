name = "hlcapp-api"
main = "src/index.js"
compatibility_date = "2025-05-01"
workers_dev = true

[vars]
APP_URL = "https://app.healthyfoodrecipesclub.com"
LOGIN_FROM_EMAIL = "info@healthyfoodrecipesclub.com"
LOGIN_FROM_NAME = "Healthy LifeStyle Club"
ALLOW_DEV_CODES = "false"
# Stripe price IDs (USD, shared US account). Placeholders until the product is created.
STRIPE_PRICE_MONTHLY = "price_1TmnjNDaaq6By5HjHM2zou2s"
STRIPE_PRICE_ANNUAL = "price_1TmnjNDaaq6By5HjLZLUiqUE"
# One-time protocol purchases (entitlement code -> price). $19 each.
STRIPE_PRICE_GUTRESET = "price_1Tn0HsDaaq6By5HjJFfng6NO"

# Secrets (set via `wrangler secret put <NAME>`, never committed):
#   BREVO_API_KEY           — sends login codes
#   STRIPE_SECRET_KEY       — sk_test_… then sk_live_… (shared US acct)
#   STRIPE_WEBHOOK_SECRET   — whsec_… from the Stripe webhook endpoint
#   PAYHIP_WEBHOOK_SECRET   — shared token; append ?key=<value> to the Payhip webhook URL

[[d1_databases]]
binding = "DB"
database_name = "hlcapp"
database_id = "cb7a8f81-13cb-4677-b3e5-72379929c1cb"

# Gated file delivery (paid PDFs). Served by /api/download after entitlement check.
[[kv_namespaces]]
binding = "FILES"
id = "b2c3ba2d20494e45b2f3b46834b738ce"
